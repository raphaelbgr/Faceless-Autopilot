version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15.4
    environment:
      POSTGRES_DB: faceless_autopilot_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tjq5uxt3
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Content Service
  ai-content:
    build:
      context: ./services/ai-content
      dockerfile: Dockerfile
    ports:
      - "8561:8561"
    environment:
      - DATABASE_URL=postgresql://postgres:tjq5uxt3@postgres:5432/faceless_autopilot_ai
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./generated_content:/app/generated_content
      - ./generated_audio:/app/generated_audio

  # Platform APIs Service
  platform-apis:
    build:
      context: ./services/platform-apis
      dockerfile: Dockerfile
    ports:
      - "8562:8562"
    environment:
      - DATABASE_URL=postgresql://postgres:tjq5uxt3@postgres:5432/faceless_autopilot_ai
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Analytics Service
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    ports:
      - "8563:8563"
    environment:
      - DATABASE_URL=postgresql://postgres:tjq5uxt3@postgres:5432/faceless_autopilot_ai
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # User Management Service
  user-management:
    build:
      context: ./services/user-management
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://postgres:tjq5uxt3@postgres:5432/faceless_autopilot_ai
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend (Next.js)
  frontend:
    build:
      context: ./faceless-frontend
      dockerfile: Dockerfile
    ports:
      - "8560:8560"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - ai-content
      - platform-apis
      - analytics
      - user-management

volumes:
  postgres_data:
  redis_data:
